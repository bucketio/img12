<svg viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="680" height="320" fill="#fafbfc" rx="8"/>
  <rect x="30" y="20" width="620" height="36" fill="#1D9E75" rx="6"/>
  <text x="190" y="43" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">资产端（供给）</text>
  <text x="490" y="43" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">负债+权益端（货币需求）</text>
  <line x1="340" y1="56" x2="340" y2="270" stroke="#ddd" stroke-width="1" stroke-dasharray="5,3"/>
  <rect x="30" y="62" width="310" height="90" fill="#e8f5ee" rx="6"/>
  <rect x="340" y="62" width="310" height="90" fill="#e8f5ee" rx="6"/>
  <text x="185" y="85" fill="#1D9E75" font-size="13" font-weight="700" text-anchor="middle">Cα 流动资产</text>
  <text x="185" y="105" fill="#555" font-size="12" text-anchor="middle">居民活期储蓄、现金</text>
  <text x="185" y="125" fill="#888" font-size="11" text-anchor="middle">短期购买力供给</text>
  <text x="185" y="142" fill="#1D9E75" font-size="11" font-weight="600" text-anchor="middle">↕ 对应</text>
  <text x="495" y="85" fill="#1D9E75" font-size="13" font-weight="700" text-anchor="middle">Ma 狭义货币（M1）</text>
  <text x="495" y="105" fill="#555" font-size="12" text-anchor="middle">银行信贷派生</text>
  <text x="495" y="125" fill="#888" font-size="11" text-anchor="middle">活期存款 = 交易货币</text>
  <text x="495" y="142" fill="#1D9E75" font-size="11" font-weight="600" text-anchor="middle">管短期交易、消费活力</text>
  <rect x="30" y="160" width="310" height="90" fill="#e8f0fa" rx="6"/>
  <rect x="340" y="160" width="310" height="90" fill="#e8f0fa" rx="6"/>
  <text x="185" y="183" fill="#2980b9" font-size="13" font-weight="700" text-anchor="middle">Cβ 固定资产</text>
  <text x="185" y="203" fill="#555" font-size="12" text-anchor="middle">房产、厂房、设备</text>
  <text x="185" y="223" fill="#888" font-size="11" text-anchor="middle">长期财富存量供给</text>
  <text x="185" y="240" fill="#2980b9" font-size="11" font-weight="600" text-anchor="middle">↕ 对应</text>
  <text x="495" y="183" fill="#2980b9" font-size="13" font-weight="700" text-anchor="middle">Mb 广义货币（M2）</text>
  <text x="495" y="203" fill="#555" font-size="12" text-anchor="middle">股债房产权益承载</text>
  <text x="495" y="223" fill="#888" font-size="11" text-anchor="middle">定期存款 + 权益资产</text>
  <text x="495" y="240" fill="#2980b9" font-size="11" font-weight="600" text-anchor="middle">管长期财富、资产定价</text>
  <rect x="30" y="265" width="620" height="40" fill="#f0fbf5" rx="6" stroke="#c8e6d5" stroke-width="1"/>
  <text x="340" y="290" fill="#1D9E75" font-size="14" font-weight="700" text-anchor="middle">总资产 = 总负债 + 所有者权益（会计恒等式）</text>
</svg>
