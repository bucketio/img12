<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" width="700" height="340">
  <rect width="700" height="340" fill="#f8f9fa" rx="8"/>
  <rect x="0" y="0" width="700" height="340" fill="none" stroke="#dee2e6" stroke-width="1" rx="8"/>
  <text x="350" y="30" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">国际镜鉴：标准化+数字化=效率跃升</text>
  
  <!-- FIDIC box -->
  <g transform="translate(20, 50)">
    <rect width="320" height="200" rx="8" fill="#e8f0fe" stroke="#1a6bff" stroke-width="1.5"/>
    <text x="160" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a6bff">FIDIC</text>
    <text x="160" y="48" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#666">国际咨询工程师联合会</text>
    <line x1="20" y1="60" x2="300" y2="60" stroke="#1a6bff" stroke-width="0.5" opacity="0.3"/>
    <text x="20" y="82" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">白皮书（2017版/2022版）</text>
    <text x="20" y="102" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#555">• 明确全生命周期服务链条</text>
    <text x="20" y="120" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#555">• 各阶段交付物标准和验收准则</text>
    <text x="20" y="138" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#555">• 引入"协作式项目管理"理念</text>
    <text x="20" y="162" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#888" font-style="italic">→ 从"裁判员"到"协作者"</text>
    <!-- Arrow -->
    <text x="160" y="185" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="12" fill="#1a6bff">标准化 → 消除信息不对称</text>
  </g>
  
  <!-- NEC4 box -->
  <g transform="translate(360, 50)">
    <rect width="320" height="200" rx="8" fill="#fff3e0" stroke="#ff6b35" stroke-width="1.5"/>
    <text x="160" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#ff6b35">NEC4</text>
    <text x="160" y="48" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#666">英国土木工程师学会</text>
    <line x1="20" y1="60" x2="300" y2="60" stroke="#ff6b35" stroke-width="0.5" opacity="0.3"/>
    <text x="20" y="82" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">NEC4合同体系（2017）</text>
    <text x="20" y="102" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#555">• 早期预警机制</text>
    <text x="20" y="120" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#555">• 各方在问题出现早期共享信息</text>
    <text x="20" y="138" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#555">• 共同数据环境（CDE）</text>
    <text x="20" y="162" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#888" font-style="italic">→ 同一数据平台协作</text>
    <!-- Arrow -->
    <text x="160" y="185" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="12" fill="#ff6b35">数字化 → 提升协同效率</text>
  </g>
  
  <!-- Conclusion bar -->
  <rect x="100" y="270" width="500" height="40" rx="20" fill="#1a6bff" opacity="0.08"/>
  <text x="350" y="295" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="14" font-weight="bold" fill="#1a6bff">共同方向：标准化 + 数字化 = 效率跃升</text>
  
  <text x="690" y="332" text-anchor="end" font-family="sans-serif" font-size="9" fill="#aaa">来源：FIDIC官网 / ICE官网 公开出版物</text>
</svg>
