<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" role="img" aria-labelledby="title desc">
  <title id="title">硬盘太满会影响周转空间</title>
  <desc id="desc">用仓库货架比喻固态硬盘太满时写入和整理效率下降。</desc>
  <rect width="900" height="430" fill="#fbfcff"/>
  <text x="48" y="66" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#182033">太满会让“整理空间”变少</text>
  <g transform="translate(70 125)">
    <rect x="0" y="0" width="320" height="210" rx="18" fill="#ffffff" stroke="#d9deea" stroke-width="3"/>
    <text x="28" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#2f6bd9">空间充足</text>
    <rect x="38" y="75" width="56" height="42" rx="8" fill="#4c8bf5"/>
    <rect x="108" y="75" width="56" height="42" rx="8" fill="#4c8bf5"/>
    <rect x="178" y="75" width="56" height="42" rx="8" fill="#4c8bf5"/>
    <rect x="38" y="133" width="56" height="42" rx="8" fill="#4c8bf5"/>
    <rect x="108" y="133" width="56" height="42" rx="8" fill="#e9edf5"/>
    <rect x="178" y="133" width="56" height="42" rx="8" fill="#e9edf5"/>
    <text x="40" y="198" font-family="Arial, sans-serif" font-size="18" fill="#5f6b80">写入和整理更轻松</text>
  </g>
  <g transform="translate(510 125)">
    <rect x="0" y="0" width="320" height="210" rx="18" fill="#ffffff" stroke="#d9deea" stroke-width="3"/>
    <text x="28" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#a85d00">接近满盘</text>
    <rect x="38" y="75" width="56" height="42" rx="8" fill="#f2b84b"/>
    <rect x="108" y="75" width="56" height="42" rx="8" fill="#f2b84b"/>
    <rect x="178" y="75" width="56" height="42" rx="8" fill="#f2b84b"/>
    <rect x="248" y="75" width="34" height="42" rx="8" fill="#e9edf5"/>
    <rect x="38" y="133" width="56" height="42" rx="8" fill="#f2b84b"/>
    <rect x="108" y="133" width="56" height="42" rx="8" fill="#f2b84b"/>
    <rect x="178" y="133" width="56" height="42" rx="8" fill="#f2b84b"/>
    <text x="40" y="198" font-family="Arial, sans-serif" font-size="18" fill="#5f6b80">每次写入都更难周转</text>
  </g>
  <path d="M414 225 H486" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L7,3 z" fill="#334155"/>
    </marker>
  </defs>
</svg>
