<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">刷新率和响应时间</title>
  <desc id="desc">用连续画面和拖影对比说明刷新率负责顺滑，响应时间影响拖影。</desc>
  <rect width="960" height="540" fill="#f8fafc"/>
  <rect x="70" y="74" width="820" height="392" rx="26" fill="#ffffff" stroke="#111827" stroke-width="4"/>
  <text x="480" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#111827">动得顺不顺，看两件事</text>
  <g transform="translate(138 190)">
    <rect x="0" y="0" width="130" height="96" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
    <rect x="155" y="0" width="130" height="96" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
    <rect x="310" y="0" width="130" height="96" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
    <circle cx="48" cy="48" r="22" fill="#2563eb"/>
    <circle cx="220" cy="48" r="22" fill="#2563eb"/>
    <circle cx="392" cy="48" r="22" fill="#2563eb"/>
    <path d="M120 48h36M275 48h36" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
    <text x="220" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1d4ed8">刷新率：画面更连贯</text>
  </g>
  <g transform="translate(590 190)">
    <rect x="0" y="0" width="230" height="96" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
    <circle cx="76" cy="48" r="25" fill="#fb923c" opacity=".28"/>
    <circle cx="105" cy="48" r="25" fill="#fb923c" opacity=".45"/>
    <circle cx="136" cy="48" r="25" fill="#f97316"/>
    <text x="115" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#c2410c">响应：拖影更少</text>
  </g>
  <text x="480" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#374151">高刷要配电脑性能、接口和线材一起看</text>
</svg>
